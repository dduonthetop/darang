<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPark FAQ 챗봇 데모</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #e5e7eb;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #0f766e;
        --ok: #16a34a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        background: linear-gradient(180deg, #eef7f5 0%, var(--bg) 45%);
        color: var(--text);
      }
      .app {
        width: min(980px, 96vw);
        margin: 16px auto;
        display: grid;
        gap: 12px;
      }
      .panel, .chat, .composer {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
      }
      .panel { padding: 14px; }
      h1 { margin: 0; font-size: 20px; }
      .sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
      .status {
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #166534;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        padding: 5px 10px;
        border-radius: 999px;
      }
      .dot-ok {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ok);
      }
      .chat {
        min-height: 460px;
        max-height: 65vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .chat-fixed {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #ffffff;
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
      }
      .chat-fixed-title {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--muted);
      }
      .chat-fixed-greeting {
        margin: 0 0 4px;
        font-size: 14px;
        color: var(--text);
      }
      .chat-messages {
        flex: 1;
        overflow: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bubble {
        max-width: 88%;
        border-radius: 14px;
        padding: 10px 12px;
        line-height: 1.45;
        font-size: 14px;
        white-space: pre-wrap;
      }
      .user {
        align-self: flex-end;
        background: var(--primary);
        color: #fff;
      }
      .bot {
        align-self: flex-start;
        border: 1px solid var(--line);
        background: #f8fafc;
      }
      .bot a {
        color: #0f766e;
        text-decoration: underline;
        word-break: break-all;
      }
      .attachment-box {
        align-self: flex-start;
        border: 1px solid var(--line);
        background: #ffffff;
        border-radius: 14px;
        padding: 10px 12px;
        max-width: 96%;
      }
      .attachment-title {
        margin: 0 0 6px;
        font-size: 13px;
        color: var(--muted);
      }
      .attachment-list {
        margin: 0;
        padding-left: 18px;
      }
      .attachment-list li {
        margin: 4px 0;
      }
      .option-bubble {
        align-self: flex-start;
        border: 1px solid var(--line);
        background: #ffffff;
        border-radius: 14px;
        padding: 10px;
        max-width: 96%;
        display: grid;
        gap: 8px;
      }
      .chat-fixed .option-bubble {
        max-width: 100%;
        border-radius: 10px;
      }
      .option-title {
        font-size: 13px;
        color: var(--muted);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { border-color: #9ca3af; }
      .option-btn.active,
      .send {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px;
      }
      .composer input {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        font-size: 15px;
      }
      .send {
        border: none;
        border-radius: 10px;
        font-weight: 700;
        padding: 0 16px;
      }
      .loading {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #94a3b8;
        animation: blink 1.2s infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
      @media (max-width: 720px) {
        .app { width: 98vw; }
        .bubble, .option-bubble { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>iPark FAQ 챗봇 데모</h1>
        <p class="sub">입점문의 / 입점진행 / 매장운영 질문에 응답하는 대화형 데모</p>
        <span class="status"><span class="dot-ok"></span>로컬 데이터셋 모드 (서버 없이 실행 가능)</span>
      </section>

      <section id="chat" class="chat">
        <div class="chat-fixed">
          <p class="chat-fixed-greeting">안녕하세요. 아이파크몰 브랜드 FAQ 챗봇입니다.</p>
          <p class="chat-fixed-title">질문의 유형을 선택해 주세요.</p>
          <div class="option-bubble">
            <div id="categoryRow" class="row"></div>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
      </section>

      <section class="composer">
        <input id="q" type="text" placeholder="예: 입점은 어떻게 진행하나요?" maxlength="300" />
        <button class="send" id="send">전송</button>
      </section>
    </main>

    <script src="./static/local_faq_data.js"></script>
    <script>
      const chat = document.getElementById("chatMessages");
      const categoryRow = document.getElementById("categoryRow");
      const qInput = document.getElementById("q");
      const sendBtn = document.getElementById("send");
      const DATA = Array.isArray(window.LOCAL_FAQ_DATA) ? window.LOCAL_FAQ_DATA : [];

      const CATEGORIES = [
        { code: "8.1", label: "입점 형태 및 기본 운영" },
        { code: "8.2", label: "출입 신청 및 인원 등록" },
        { code: "8.3", label: "차량/주차/하역/동선" },
        { code: "8.4", label: "반입/반출 및 보관" },
        { code: "8.5", label: "매장 시설 및 공사" },
        { code: "8.6", label: "매장 운영 및 서비스" },
        { code: "8.7", label: "비품/쇼핑백" },
        { code: "8.12", label: "POS" },
        { code: "8.13", label: "내선전화" },
        { code: "8.8", label: "인력 운영 및 교육" },
        { code: "8.9", label: "정산 및 행정" },
        { code: "8.10", label: "마케팅/사인물/콘텐츠" },
        { code: "8.11", label: "철수/연장/계약 종료" }
      ];

      const EXAMPLES_BY_CATEGORY = {
        "8.1": ["입점은 어떻게 진행하나요?", "매장 운영시간이 어떻게 되나요?"],
        "8.2": ["출입 신청은 어떤 시스템으로 접수하나요?", "야간 작업 인원 등록은 어떻게 하나요?"],
        "8.3": ["브랜드 지원 주차 기준은 어떻게 되나요?", "하역장 진입 차량 제한이 있나요?"],
        "8.4": ["택배 수령은 어디서 가능한가요?", "임시 보관 공간도 제공되나요?"],
        "8.5": ["추가 전력 사용은 어떻게 신청하나요?", "공사 가능 시간은 언제인가요?"],
        "8.6": ["POS에 바코드 스캔 기능이 있나요?", "고객 컴플레인은 어디로 접수하나요?"],
        "8.7": ["쇼핑백은 어디서 받나요?", "쇼핑백 수령 위치가 어디인가요?"],
        "8.12": ["POS는 기본 제공되나요?", "POS 장애 발생 시 어디로 연락하나요?"],
        "8.13": ["내선전화 신청은 어떻게 하나요?", "내선전화 설치 리드타임은 얼마나 걸리나요?"],
        "8.8": ["필수 이수 교육이 있나요?", "모바일 출입증 발급도 가능한가요?"],
        "8.9": ["정산은 언제 입금되나요?", "세금계산서는 어떻게 처리되나요?"],
        "8.10": ["DID 송출은 어떻게 요청하나요?", "몰 광고물은 언제까지 요청해야 하나요?"],
        "8.11": ["영업 철수는 언제 가능한가요?", "계약 연장은 언제 협의하나요?"]
      };

      // Hardcoded preset answers can drift from dataset and cause factual mismatch.
      // Keep answers dataset-driven.
      const PRESET_RULES = [];

      const STAGE_KEYWORDS = {
        "입점문의": ["입점", "제안", "브랜드", "팝업", "문의"],
        "입점진행": ["계약", "출입", "pms", "설치", "철수", "하역", "차량", "광고", "did", "내선"],
        "매장운영": ["운영", "pos", "포스", "쇼핑백", "정산", "매출", "고장", "민원", "고객"]
      };

      const INTENT_TAG_PATTERNS = {
        pos: /(^|\s)(pos|포스)(\s|$)|바코드|스캔|전산/,
        shoppingbag: /쇼핑백|불출/,
        phone: /내선|kt|전화/,
        entry: /출입|출입신청|pms|야간/,
        parking: /주차|주차권|주차요금/,
        loading: /하역|반입|반출|셔터|동선/,
        electric: /전기|조명/,
        facility: /설비|누수|공조/,
        safety: /방재|소방|안전|화기/,
        settlement: /정산|입금|트러스빌/,
        tax: /세금계산서|역발행/,
        ads_app: /app|앱|광고|상세페이지/,
        ads_did: /did|송출|에스컬레이터|엘리베이터/,
        cs: /컴플레인|고객상담|분실물|유실물|사고/
      };

      let categoryHint = "";
      let exampleSelectorEl = null;

      function normalize(t) {
        return (t || "")
          .toLowerCase()
          .replace(/[^0-9a-z가-힣\s]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function tokenize(t) {
        return normalize(t).split(" ").filter(Boolean);
      }

      function intentFlags(question) {
        const q = normalize(question);
        const hasPos = /(^|\s)(pos|포스)(\s|$)/.test(q) || q.includes("바코드") || q.includes("스캔");
        const hasShoppingBag = q.includes("쇼핑백");
        return { hasPos, hasShoppingBag };
      }

      function detectIntentTags(text) {
        const n = normalize(text);
        const tags = new Set();
        Object.entries(INTENT_TAG_PATTERNS).forEach(([tag, pattern]) => {
          if (pattern.test(n)) tags.add(tag);
        });
        return tags;
      }

      function overlap(a, b) {
        const sa = new Set(a);
        const sb = new Set(b);
        if (!sa.size || !sb.size) return 0;
        let inter = 0;
        sa.forEach((v) => { if (sb.has(v)) inter += 1; });
        return inter / new Set([...sa, ...sb]).size;
      }

      function classifyStage(question) {
        const n = normalize(question);
        const score = { "입점문의": 0, "입점진행": 0, "매장운영": 0 };
        Object.entries(STAGE_KEYWORDS).forEach(([stage, kws]) => {
          kws.forEach((k) => { if (n.includes(k)) score[stage] += 1; });
        });
        const best = Object.keys(score).sort((a, b) => score[b] - score[a])[0];
        return score[best] > 0 ? best : "입점문의";
      }

      function scoreItem(question, item, categoryPrefix) {
        const qn = normalize(question);
        const qt = tokenize(question);
        const full = [item.question, ...(item.paraphrases || []), ...(item.keywords || []), item.category, item.stage].join(" ");
        const ft = tokenize(full);
        const flags = intentFlags(question);
        const intentText = [item.question, ...(item.paraphrases || []), ...(item.keywords || [])].join(" ");
        const itemNorm = normalize(intentText);
        const qTags = detectIntentTags(question);
        const itemTags = detectIntentTags(intentText);

        let score = overlap(qt, ft) * 0.72;
        const questionNorm = normalize(item.question || "");
        if (questionNorm === qn) score += 0.4;
        if (questionNorm.includes(qn) || qn.includes(questionNorm)) score += 0.18;

        const para = (item.paraphrases || []).map(normalize);
        if (para.includes(qn)) score += 0.32;
        if (para.some((p) => p.includes(qn) || qn.includes(p))) score += 0.12;

        if (categoryPrefix) {
          if ((item.category || "").startsWith(categoryPrefix)) score += 0.14;
          else score -= 0.03;
        }

        // Prevent cross-topic leakage inside 8.7 (POS vs 쇼핑백).
        if (flags.hasPos) {
          if (/(^|\s)(pos|포스)(\s|$)|바코드|스캔/.test(itemNorm)) score += 0.26;
          if (itemNorm.includes("쇼핑백")) score -= 0.22;
        }
        if (flags.hasShoppingBag) {
          if (itemNorm.includes("쇼핑백")) score += 0.26;
          if (/(^|\s)(pos|포스)(\s|$)|바코드|스캔/.test(itemNorm)) score -= 0.22;
        }

        // General cross-category disambiguation:
        // if question has clear intent tags, penalize items with disjoint tags.
        if (qTags.size && itemTags.size) {
          let overlapCount = 0;
          qTags.forEach((t) => { if (itemTags.has(t)) overlapCount += 1; });
          if (overlapCount === 0) score -= 0.18;
          else score += Math.min(0.14, overlapCount * 0.07);
        }

        return score;
      }

      function localFallback(question) {
        const stage = classifyStage(question);
        return {
          question,
          category: "",
          stage,
          core_answer: "해당 질문은 현재 정보만으로 단정하기 어렵습니다. 담당 바이어 확인이 필요합니다.",
          next_action: "대상(입점/출입/POS/정산)과 일정/장소를 함께 정리해 다시 문의하시면 됩니다.",
          contact_channel: "담당 바이어",
          confidence_type: "확인 필요형 답변",
          manual_files: []
        };
      }

      function findExactInScope(questionNorm, categoryPrefix) {
        const scoped = DATA.filter((item) => (item.category || "").startsWith(categoryPrefix));
        for (const item of scoped) {
          if (normalize(item.question || "") === questionNorm) return item;
          const paras = (item.paraphrases || []).map((p) => normalize(p));
          if (paras.includes(questionNorm)) return item;
        }
        return null;
      }

      function getIntentScopedData(question, dataPool) {
        const qTags = detectIntentTags(question);
        const strongTags = [
          "pos", "shoppingbag", "phone", "entry", "parking", "loading",
          "electric", "facility", "safety", "settlement", "tax", "ads_app", "ads_did", "cs"
        ];
        const activeStrongTags = strongTags.filter((t) => qTags.has(t));
        if (!activeStrongTags.length) return dataPool;

        const filtered = dataPool.filter((item) => {
          const intentText = [item.question, ...(item.paraphrases || []), ...(item.keywords || [])].join(" ");
          const itemTags = detectIntentTags(intentText);
          return activeStrongTags.some((tag) => itemTags.has(tag));
        });

        return filtered.length ? filtered : dataPool;
      }

      function localAnswer(question, categoryPrefix) {
        const qn = normalize(question);
        const intentScopedData = getIntentScopedData(question, DATA);
        const intentScopedByCategory = categoryPrefix
          ? intentScopedData.filter((item) => (item.category || "").startsWith(categoryPrefix))
          : intentScopedData;

        const exactPool = intentScopedByCategory.length ? intentScopedByCategory : intentScopedData;
        for (const item of exactPool) {
          if (normalize(item.question || "") === qn) {
            return {
              faq_id: item.faq_id || "",
              question: item.question || question,
              category: item.category || "",
              stage: item.stage || classifyStage(question),
              core_answer: item.answer || "확인 가능한 답변 데이터가 없습니다.",
              next_action: item.next_action || "필요한 경우 담당 바이어에게 추가로 확인하시면 됩니다.",
              contact_channel: item.contact_channel || "",
              confidence_type: item.confidence_type || "운영 사례형 답변",
              manual_files: Array.isArray(item.manual_files) ? item.manual_files : []
            };
          }
          const paras = (item.paraphrases || []).map((p) => normalize(p));
          if (paras.includes(qn)) {
            return {
              faq_id: item.faq_id || "",
              question: item.question || question,
              category: item.category || "",
              stage: item.stage || classifyStage(question),
              core_answer: item.answer || "확인 가능한 답변 데이터가 없습니다.",
              next_action: item.next_action || "필요한 경우 담당 바이어에게 추가로 확인하시면 됩니다.",
              contact_channel: item.contact_channel || "",
              confidence_type: item.confidence_type || "운영 사례형 답변",
              manual_files: Array.isArray(item.manual_files) ? item.manual_files : []
            };
          }
        }

        const exact = findExactInScope(qn, categoryPrefix);
        if (exact) {
          return {
            faq_id: exact.faq_id || "",
            question: exact.question || question,
            category: exact.category || "",
            stage: exact.stage || classifyStage(question),
            core_answer: exact.answer || "확인 가능한 답변 데이터가 없습니다.",
            next_action: exact.next_action || "필요한 경우 담당 바이어에게 추가로 확인하시면 됩니다.",
            contact_channel: exact.contact_channel || "",
            confidence_type: exact.confidence_type || "운영 사례형 답변",
            manual_files: Array.isArray(exact.manual_files) ? exact.manual_files : []
          };
        }

        const scorePool = (categoryPrefix && intentScopedByCategory.length)
          ? intentScopedByCategory
          : intentScopedData;

        const scored = scorePool
          .map((item) => ({ item, score: scoreItem(question, item, categoryPrefix) }))
          .sort((a, b) => b.score - a.score);

        let top = scored[0];

        if (!top || top.score < 0.14) {
          const rescored = intentScopedData
            .map((item) => ({ item, score: scoreItem(question, item, "") }))
            .sort((a, b) => b.score - a.score);
          top = rescored[0];
        }

        if (!top || top.score < 0.12) return localFallback(question);

        for (const rule of PRESET_RULES) {
          if (rule.test(qn)) {
            return {
              ...rule.answer,
              question,
              category: categoryPrefix || ""
            };
          }
        }

        return {
          faq_id: top.item.faq_id || "",
          question: top.item.question || question,
          category: top.item.category || "",
          stage: top.item.stage || classifyStage(question),
          core_answer: top.item.answer || "확인 가능한 답변 데이터가 없습니다.",
          next_action: top.item.next_action || "필요한 경우 담당 바이어에게 추가로 확인하시면 됩니다.",
          contact_channel: top.item.contact_channel || "",
          confidence_type: top.item.confidence_type || "운영 사례형 답변",
          manual_files: Array.isArray(top.item.manual_files) ? top.item.manual_files : []
        };
      }

      function escapeHtml(raw) {
        return (raw || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function linkify(text) {
        const raw = text || "";
        const parts = raw.split(/(https?:\/\/[^\s]+)/g);
        return parts.map((part, idx) => {
          if (idx % 2 === 0) return escapeHtml(part);

          let url = part;
          let tail = "";
          while (/[),.;!?]$/.test(url)) {
            tail = url.slice(-1) + tail;
            url = url.slice(0, -1);
          }

          const safeUrl = escapeHtml(url);
          const safeTail = escapeHtml(tail);
          return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>${safeTail}`;
        }).join("");
      }

      function addBubble(text, role = "bot", allowRichText = false) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        if (allowRichText) {
          div.innerHTML = linkify(text).replace(/\n/g, "<br>");
        } else {
          div.textContent = text;
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      function safeHref(path) {
        return encodeURI(path || "");
      }

      function renderManualAttachments(data) {
        const fromData = Array.isArray(data.manual_files) ? data.manual_files : [];
        const files = [...new Set(fromData)].filter(Boolean);
        if (!files.length) return;

        const box = document.createElement("div");
        box.className = "attachment-box";

        const title = document.createElement("p");
        title.className = "attachment-title";
        title.textContent = "다운로드 가능한 매뉴얼";
        box.appendChild(title);

        const list = document.createElement("ul");
        list.className = "attachment-list";
        files.forEach((filePath) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = safeHref(filePath);
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.download = filePath.split("/").pop() || "manual.pdf";
          a.textContent = filePath.replace("./manual/", "");
          li.appendChild(a);
          list.appendChild(li);
        });
        box.appendChild(list);
        chat.appendChild(box);
        chat.scrollTop = chat.scrollHeight;
      }

      function addOptionBubble(titleText) {
        const wrap = document.createElement("div");
        wrap.className = "option-bubble";

        const row = document.createElement("div");
        row.className = "row";

        if (titleText) {
          const title = document.createElement("div");
          title.className = "option-title";
          title.textContent = titleText;
          wrap.appendChild(title);
        }
        wrap.appendChild(row);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
        return { wrap, row };
      }

      function toConversational(text) {
        let t = (text || "").replace(/\s+/g, " ").trim();
        if (!t) return "";

        t = t
          .replace(/가능\./g, "가능합니다.")
          .replace(/불가\./g, "불가합니다.")
          .replace(/필요\./g, "필요합니다.")
          .replace(/확인 필요\./g, "확인이 필요합니다.")
          .replace(/문의해 주세요\./g, "문의하시면 됩니다.")
          .replace(/확인해 주세요\./g, "확인하시면 됩니다.")
          .replace(/전달해 주세요\./g, "전달하시면 됩니다.")
          .replace(/방문해 주세요\./g, "방문하시면 됩니다.")
          .replace(/해 주세요(?=\.|$)/g, "하시면 됩니다")
          .replace(/해주세요(?=\.|$)/g, "해 주시면 됩니다");

        if (!/[.!?]$/.test(t)) t += ".";
        return t;
      }

      function formatAnswerShort(data) {
        const lines = [];
        const core = toConversational(data.core_answer || "답변을 찾지 못했습니다.");
        lines.push(`문의하신 내용 안내드립니다. ${core}`);

        if (data.next_action) {
          lines.push(`다음으로 ${toConversational(data.next_action)}`);
        }
        const contact = resolveContactChannel(data);
        lines.push(`추가 문의는 ${contact} 채널로 부탁드립니다.`);
        return lines.join("\n");
      }

      function resolveContactChannel(data) {
        const explicit = (data.contact_channel || "").trim();
        const q = `${data.question || ""} ${data.core_answer || ""}`.toLowerCase();

        if (explicit) return explicit;
        if (q.includes("pos") || q.includes("포스")) return "전산/POS 02-2012-0200";
        if (q.includes("내선") || q.includes("kt")) return "KT 02-2012-2200";
        if (q.includes("출입") || q.includes("야간") || q.includes("반입") || q.includes("반출") || q.includes("하역")) {
          return "보안 02-2012-4112";
        }
        if (q.includes("정산") || q.includes("세금계산서")) return "담당 바이어";
        return "담당 바이어";
      }

      function renderCategorySelector() {
        categoryRow.innerHTML = "";

        CATEGORIES.forEach((c) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = c.label;
          btn.addEventListener("click", () => {
            categoryHint = c.code;
            categoryRow.querySelectorAll(".option-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderExampleSelector(c.code);
          });
          categoryRow.appendChild(btn);
        });
      }

      function renderExampleSelector(categoryCode) {
        const examples = EXAMPLES_BY_CATEGORY[categoryCode] || [];

        if (!exampleSelectorEl) {
          const { wrap } = addOptionBubble("예시 질문을 선택하거나 직접 입력해 주세요.");
          exampleSelectorEl = wrap;
        }

        const row = exampleSelectorEl.querySelector(".row");
        row.innerHTML = "";

        examples.forEach((q) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = q;
          btn.addEventListener("click", () => ask(q));
          row.appendChild(btn);
        });

        chat.scrollTop = chat.scrollHeight;
      }

      async function ask(text) {
        const question = (text || "").trim();
        if (!question) return;

        addBubble(question, "user");
        qInput.value = "";

        const loading = document.createElement("div");
        loading.className = "bubble bot loading";
        loading.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        await new Promise((r) => setTimeout(r, 220));
        loading.remove();

        const ans = localAnswer(question, categoryHint);
        addBubble(formatAnswerShort(ans), "bot", true);
        renderManualAttachments(ans);
      }

      sendBtn.addEventListener("click", () => ask(qInput.value));
      qInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          ask(qInput.value);
        }
      });

      renderCategorySelector();

      if (!DATA.length) {
        addBubble("로컬 데이터셋을 불러오지 못했습니다. static/local_faq_data.js 파일 경로를 확인해 주세요.");
      }
    </script>
  </body>
</html>
